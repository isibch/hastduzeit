<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Hast du Zeit?</title>
</head>
<body>
    <main class="screen-start">
    <div class="envelope-container">
        <img src="assets/envelope.png" alt="Briefumschlag" class="envelope">
    </div>
    <div class="message-info">
        <h1>Eine neue Nachricht.</h1>

        <p class="message-meta">
            Gesendet am: 13.03.2026<br>
            Von: Isi
        </p>
    </div>
    </main>

    <main class="screen-question">
        <div class="question-content">
            <img src="assets/letter.png" alt="Frage" class="question-image">
            <div class="question-text">
                Hast du nächstes<br>
                Wochenende Zeit?
            </div>
        </div>
        
        <div class="answer-buttons">
                <button class="answer-button" id="yes-button">Ja</button>
                <button class="answer-button" id="no-button">Nein</button>
            </div>
        </div>
    </main>

    <main class="screen-answer">
        <div class="answer-content">
            <img src="assets/letter.png" alt="Antwort" class="answer-image">
            <div class="answer-text">
                <h2>Ich freu mich!</h2>
                <p class="answer-subtext">To be continued...</p>
                <div id="countdown"></div>
            </div>
        </div>

        <div class="gif-stage">
            <img src="gif/gif2.gif" class="final-gif" alt="">
        </div>

        <audio id="final-song" src="assets/nureinwort.mp3"></audio>
    </main>

    <script src="script.js"></script>
</body>
</html>
